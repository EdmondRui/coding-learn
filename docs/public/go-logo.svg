<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" fill="none">
  <rect width="88" height="88" rx="16" fill="#00ADD8"/>
  <!-- Gopher body -->
  <ellipse cx="44" cy="54" rx="20" ry="20" fill="#F5D5A0"/>
  <!-- Gopher head -->
  <circle cx="44" cy="34" r="16" fill="#F5D5A0"/>
  <!-- Eyes -->
  <circle cx="37" cy="32" r="5.5" fill="white"/>
  <circle cx="51" cy="32" r="5.5" fill="white"/>
  <circle cx="38.5" cy="32" r="2.8" fill="#333"/>
  <circle cx="52.5" cy="32" r="2.8" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="44" cy="38" rx="3" ry="2" fill="#D4A76A"/>
  <!-- Teeth -->
  <rect x="41" y="41" width="3" height="5" rx="1" fill="white"/>
  <rect x="45" y="41" width="3" height="5" rx="1" fill="white"/>
  <!-- Ears -->
  <circle cx="28" cy="22" r="6" fill="#F5D5A0"/>
  <circle cx="60" cy="22" r="6" fill="#F5D5A0"/>
  <circle cx="28" cy="22" r="3.5" fill="#E8B88A"/>
  <circle cx="60" cy="22" r="3.5" fill="#E8B88A"/>
</svg>